name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test
        run: go test ./...

      - name: Build app bundle
        run: scripts/build-macos-app.sh

      - name: Archive app bundle
        run: ditto -c -k --keepParent "dist/YAML Struct Editor.app" "dist/YAML-Struct-Editor-macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YAML-Struct-Editor-macOS
          path: dist/YAML-Struct-Editor-macOS.zip

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test
        run: go test ./...

      - name: Build executable
        shell: pwsh
        run: scripts\build-windows.ps1

      - name: Archive executable
        shell: pwsh
        run: Compress-Archive -Path dist\yaml-struct-editor.exe -DestinationPath dist\YAML-Struct-Editor-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YAML-Struct-Editor-Windows
          path: dist/YAML-Struct-Editor-Windows.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/YAML-Struct-Editor-macOS.zip
            dist/YAML-Struct-Editor-Windows.zip
